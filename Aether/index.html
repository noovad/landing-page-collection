<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{seo.title}}</title>
    <meta name="description" content="{{seo.description}}" />
    <meta name="keywords" content="{{join seo.keywords ', '}}" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{brand.website}}/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{seo.title}}" />
    <meta property="og:description" content="{{seo.description}}" />
    <meta property="og:url" content="{{brand.website}}/" />
    <meta property="og:site_name" content="{{brand.name}}" />
    <meta property="og:image" content="https://picsum.photos/id/1025/1200/630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{seo.title}}" />
    <meta name="twitter:description" content="{{seo.description}}" />
    <meta name="twitter:image" content="https://picsum.photos/id/1025/1200/630" />

    <link rel="stylesheet" href="./css/app.css" />
  </head>

  <body class="bg-background text-text">
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:bg-primary focus:text-white focus:rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2"
    >
      Skip to main content
    </a>

    {{> header}}

    <main id="main-content">
      {{> home/hero}} {{> home/trusted}} {{> home/features}} {{> home/statistics}} {{> home/quote}} {{> home/solutions}} {{> home/pricing}} {{>
      home/testimonials}} {{> home/cta}} {{> home/faq}}
    </main>

    {{> footer}}

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
