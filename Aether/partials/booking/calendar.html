<div
  x-show="step === 'calendar'"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  class="p-8"
>
  <h2 class="text-xl font-medium text-center mb-6" style="font-family: 'Lora', serif;">Select a Day</h2>

  <div class="flex items-center justify-between mb-6">
    <button @click="prevMonth()" class="p-2 hover:bg-surface rounded-lg transition-colors" aria-label="Previous month">
      <i data-lucide="chevron-left" class="w-5 h-5"></i>
    </button>
    <span class="font-medium" x-text="monthLabel()"></span>
    <button @click="nextMonth()" class="p-2 hover:bg-surface rounded-lg transition-colors" aria-label="Next month">
      <i data-lucide="chevron-right" class="w-5 h-5"></i>
    </button>
  </div>

  <div class="grid grid-cols-7 gap-1 mb-2">
    <template x-for="day in ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']">
      <div class="text-center text-xs font-medium text-muted py-2" x-text="day"></div>
    </template>
  </div>

  <div class="grid grid-cols-7 gap-1">
    <template x-for="blank in blanks()">
      <div></div>
    </template>
    <template x-for="day in days()">
      <button
        @click="selectDate(day)"
        :disabled="!day.available"
        :class="{
          'bg-primary text-white': isSelectedDate(day),
          'hover:bg-surface cursor-pointer': day.available && !isSelectedDate(day),
          'text-muted/40 cursor-not-allowed': !day.available
        }"
        class="w-full aspect-square flex items-center justify-center rounded-lg text-sm transition-colors"
        x-text="day.num"
      ></button>
    </template>
  </div>

  <div class="mt-8 pt-6 border-t border-border">
    <div class="flex items-center gap-2 text-sm text-muted">
      <i data-lucide="globe" class="w-4 h-4"></i>
      <span>{{booking.timezone}} (<span x-text="currentTimezone()"></span>)</span>
    </div>
  </div>
</div>
