<div
  x-show="step === 'form'"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  class="p-8"
>
  <button @click="step = 'time'" class="flex items-center gap-2 text-muted hover:text-text mb-6 transition-colors">
    <i data-lucide="arrow-left" class="w-5 h-5"></i>
  </button>

  <div class="text-center mb-6">
    <span class="text-sm font-medium">{{brand.name}}</span>
    <h2 class="text-xl font-medium mt-2 mb-4" style="font-family: 'Lora', serif;">{{booking.title}}</h2>
    <div class="space-y-2 text-sm text-muted">
      <div class="flex items-center justify-center gap-2">
        <i data-lucide="clock" class="w-4 h-4"></i>
        <span>{{booking.duration}} min</span>
      </div>
      <div class="flex items-center justify-center gap-2">
        <i data-lucide="calendar" class="w-4 h-4"></i>
        <span x-text="selectedTimeLabel()"></span>
      </div>
      <div class="flex items-center justify-center gap-2">
        <i data-lucide="globe" class="w-4 h-4"></i>
        <span>{{booking.timezone}}</span>
      </div>
    </div>
  </div>

  <div class="border-t border-border pt-6">
    <h3 class="font-medium mb-4">Enter Details</h3>
    <form @submit.prevent="submitBooking()" class="space-y-4">
      <div>
        <label for="book-name" class="block text-sm font-medium mb-1.5">Name *</label>
        <input
          id="book-name"
          type="text"
          x-model="formData.name"
          required
          class="w-full px-4 py-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent"
        />
      </div>
      <div>
        <label for="book-email" class="block text-sm font-medium mb-1.5">Email *</label>
        <input
          id="book-email"
          type="email"
          x-model="formData.email"
          required
          class="w-full px-4 py-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent"
        />
      </div>
      <div>
        <button
          type="button"
          @click="showGuests = !showGuests"
          class="w-full py-3 px-4 border border-border rounded-lg text-sm font-medium hover:bg-surface transition-colors"
        >
          Add guests
        </button>
        <div x-show="showGuests" x-transition class="mt-3">
          <label for="book-guests" class="block text-sm font-medium mb-1.5">Guest email(s)</label>
          <textarea
            id="book-guests"
            x-model="formData.guests"
            rows="3"
            class="w-full px-4 py-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent resize-none"
          ></textarea>
          <p class="text-xs text-muted mt-1">Notify up to 10 additional guests of the scheduled event.</p>
        </div>
      </div>
      <div>
        <label for="book-notes" class="block text-sm font-medium mb-1.5">Please share anything that will help prepare for our meeting.</label>
        <textarea
          id="book-notes"
          x-model="formData.notes"
          rows="3"
          class="w-full px-4 py-3 border border-border rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent resize-none"
        ></textarea>
      </div>
      <p class="text-xs text-muted">
        By proceeding, you confirm that you have read and agree to
        <a href="/terms" class="underline hover:text-text">Aether's Terms and Privacy Notice</a>.
      </p>
      <button
        type="submit"
        class="w-full bg-primary text-white py-3 rounded-lg font-medium hover:bg-primary/90 transition-colors"
      >
        {{booking.form.submit}}
      </button>
    </form>
  </div>
</div>
