<div
  x-show="step === 'time'"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  class="p-8"
>
  <button @click="step = 'calendar'" class="flex items-center gap-2 text-muted hover:text-text mb-6 transition-colors">
    <i data-lucide="arrow-left" class="w-5 h-5"></i>
  </button>

  <div class="text-center mb-6">
    <h2 class="text-xl font-medium mb-1" style="font-family: 'Lora', serif;" x-text="selectedDayName()"></h2>
    <p class="text-muted text-sm" x-text="selectedDateLabel()"></p>
  </div>

  <div class="flex items-center gap-2 text-sm text-muted mb-6 justify-center">
    <i data-lucide="globe" class="w-4 h-4"></i>
    <span>{{booking.timezone}} (<span x-text="currentTimezone()"></span>)</span>
  </div>

  <div class="text-center mb-2">
    <h3 class="text-lg font-medium" style="font-family: 'Lora', serif;">Select a Time</h3>
    <p class="text-muted text-sm mt-1">Duration: {{booking.duration}} min</p>
  </div>

  <div class="space-y-3 mt-6 max-h-80 overflow-y-auto pr-2">
    {{#each booking.timeSlots}}
    <button
      @click="selectTime('{{this}}')"
      :class="{
        'border-2 border-primary bg-primary/5': selectedTime === '{{this}}',
        'border border-border hover:border-primary/50': selectedTime !== '{{this}}'
      }"
      class="w-full py-3 px-4 rounded-lg text-center font-medium transition-all flex items-center justify-between"
    >
      <span x-show="selectedTime !== '{{this}}'">{{this}}</span>
      <span x-show="selectedTime === '{{this}}'" class="flex items-center justify-center w-full gap-3">
        <span>{{this}}</span>
        <span class="text-on-dark bg-primary px-4 py-1.5 rounded-md text-sm font-medium hover:bg-primary/90 transition-colors">Next</span>
      </span>
    </button>
    {{/each}}
  </div>
</div>
