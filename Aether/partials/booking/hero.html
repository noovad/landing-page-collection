<div class="bg-primary text-on-dark flex-1 flex flex-col justify-center px-8 py-16 lg:px-20 lg:py-20">
  <a href="/" class="flex items-center gap-2 mb-16 text-on-dark hover:text-on-dark/80 transition-colors">
    <span class="text-lg font-medium">{{brand.name}}</span>
  </a>

  <span class="eyebrow-light text-on-dark-secondary uppercase tracking-wider text-sm mb-4">{{booking.eyebrow}}</span>
  <h1 class="text-4xl lg:text-5xl font-medium text-on-dark mb-12" style="font-family: 'Lora', serif;">{{booking.title}}</h1>

  <div class="space-y-6">
    {{#each booking.benefits}}
    <div class="flex items-start gap-4">
      <div class="w-10 h-10 flex items-center justify-center flex-shrink-0 mt-0.5">
        <i data-lucide="{{icon}}" class="w-5 h-5 text-on-dark"></i>
      </div>
      <p class="text-on-dark-secondary leading-relaxed">{{text}}</p>
    </div>
    {{/each}}
  </div>
</div>
