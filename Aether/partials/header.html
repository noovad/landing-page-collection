<header
  id="header"
  x-data="{ mobileOpen: false }"
  class="header header-transparent"
>
  <div class="mx-auto max-w-7xl flex items-center justify-between">
    <a href="#" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-secondary to-accent flex items-center justify-center">
        <span class="text-white font-bold text-sm">A</span>
      </div>
      <span class="font-bold text-xl">Aether</span>
    </a>
    <div class="flex items-center gap-3">
      <nav
        id="headerNav"
        class="hidden md:flex items-center gap-8 font-medium text-sm transition-all duration-500"
      >
        <a href="#features" class="hover:text-secondary transition-colors">Features</a>
        <a href="#pricing" class="hover:text-secondary transition-colors">Pricing</a>
        <a href="#faq" class="hover:text-secondary transition-colors">FAQ</a>
      </nav>
      <button
        id="headerCta"
        class="btn-primary text-sm transition-all duration-500 translate-x-12 opacity-0"
      >
        Get started
      </button>
      <button
        @click="mobileOpen = !mobileOpen"
        class="md:hidden text-2xl"
        aria-label="Toggle menu"
      >
        <span x-show="!mobileOpen">☰</span>
        <span x-show="mobileOpen" style="display: none;">✕</span>
      </button>
    </div>
  </div>
  <div
    x-show="mobileOpen"
    @click.away="mobileOpen = false"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="md:hidden mt-4 bg-white rounded-xl shadow-lg p-6 text-text"
  >
    <nav class="flex flex-col gap-4 text-base font-medium">
      <a href="#features" @click="mobileOpen = false">Features</a>
      <a href="#pricing" @click="mobileOpen = false">Pricing</a>
      <a href="#faq" @click="mobileOpen = false">FAQ</a>
      <hr class="border-border" />
      <a href="#" @click="mobileOpen = false" class="btn-primary text-center">Get started</a>
    </nav>
  </div>
</header>
