<header
  id="header"
  x-data="{ mobileOpen: false }"
  class="header header-solid"
>
  <div class="mx-auto max-w-7xl flex items-center justify-between">
    <a href="#" class="flex items-center gap-2">
      <span class="font-bold text-xl text-text">Rhetorich</span>
    </a>
    <div class="flex items-center gap-3">
      <nav
        id="headerNav"
        class="hidden md:flex items-center gap-8 font-medium text-sm transition-all duration-500"
      >
        <a href="#features" class="hover:text-secondary transition-colors text-text">Product</a>
        <a href="#pricing" class="hover:text-secondary transition-colors text-text">Pricing</a>
        <a href="#faq" class="hover:text-secondary transition-colors text-text">FAQ</a>
      </nav>
      <button
        id="headerCta"
        class="btn-primary text-sm transition-all duration-500"
      >
        Book a demo
      </button>
      <button
        @click="mobileOpen = !mobileOpen"
        class="md:hidden text-2xl text-text"
        aria-label="Toggle menu"
      >
        <span x-show="!mobileOpen">☰</span>
        <span x-show="mobileOpen" style="display: none;">✕</span>
      </button>
    </div>
  </div>
  <div
    x-show="mobileOpen"
    @click.away="mobileOpen = false"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="md:hidden mt-4 bg-white rounded-xl shadow-lg p-6 text-text"
  >
    <nav class="flex flex-col gap-4 text-base font-medium">
      <a href="#features" @click="mobileOpen = false">Product</a>
      <a href="#pricing" @click="mobileOpen = false">Pricing</a>
      <a href="#faq" @click="mobileOpen = false">FAQ</a>
      <hr class="border-border" />
      <a href="#" @click="mobileOpen = false" class="btn-primary text-center">Book a demo</a>
    </nav>
  </div>
</header>
