<header id="header" x-data="{ mobileOpen: false }" class="header header-primary" role="banner">
  <div class="mx-auto max-w-7xl flex items-center justify-between">
    <a href="/" class="flex items-center gap-2" aria-label="{{brand.name}} - Home">
      <h4 class="font-bold">{{brand.name}}</h4>
    </a>
    <div class="flex items-center">
      <nav
        id="headerNav"
        class="hidden md:flex items-center gap-8 font-medium transition-all translate-x-32"
        aria-label="Main navigation"
      >
        {{#each navigation.items}}
        <a href="{{href}}">{{label}}</a>
        {{/each}}
      </nav>
      <a
        href="{{navigation.cta.href}}"
        id="headerCta"
        class="btn-accent hidden md:block overflow-hidden transition-all duration-500 translate-x-[50vw] text font-normal! px-4! py-2!"
      >
        {{navigation.cta.label}}
      </a>
      <button
        @click="mobileOpen = !mobileOpen"
        class="md:hidden"
        aria-label="Toggle menu"
        :aria-expanded="mobileOpen"
        aria-controls="mobile-menu"
      >
        <i x-show="!mobileOpen" data-lucide="menu" class="w-6 h-6" x-cloak></i>
        <i x-show="mobileOpen" data-lucide="x" class="w-6 h-6" x-cloak></i>
      </button>
    </div>
  </div>
  <div
    id="mobile-menu"
    x-show="mobileOpen"
    @click.away="mobileOpen = false"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    class="md:hidden mt-4 bg-background rounded-lg shadow-lg p-6"
    role="navigation"
    aria-label="Mobile navigation"
  >
    <nav class="flex flex-col gap-4 font-medium text-text">
      {{#each navigation.items}}
      <a href="{{href}}" @click="mobileOpen = false">{{label}}</a>
      {{/each}}
      <hr class="border-border" />
      <a href="#" @click="mobileOpen = false" class="btn-accent text-center w-full">{{navigation.cta.label}}</a>
    </nav>
  </div>
</header>
