<section
  data-header="solid"
  class="animate-on-scroll-group py-24 lg:py-32 bg-surface relative"
  aria-labelledby="impact-heading"
>
  <div class="max-w-7xl mx-auto px-6 lg:px-10">
    <div>
      <span class="slide-up eyebrow">{{impact.eyebrow}}</span>
      <h2 id="impact-heading" class="slide-up mt-4 mb-6">{{impact.title}}</h2>
      <p class="slide-up text-lg leading-relaxed mb-10">
        {{impact.description}}
      </p>
      <div class="fade-in flex flex-wrap gap-4" role="list">
        {{#each impact.stats}}
        <div class="min-w-[300px] flex-1 p-6 {{#if @first}}bg-primary text-on-dark{{else}}{{#if @last}}bg-primary text-on-dark{{else}}bg-secondary/20{{/if}}{{/if}}" role="listitem">
          <p class="text-3xl font-medium"><span class="counter" data-target="{{value}}" data-duration="2000"></span>{{suffix}}</p>
          <p class="mt-2 text-sm {{#if @first}}text-on-dark-secondary{{else}}{{#if @last}}text-on-dark-secondary{{else}}text-muted{{/if}}{{/if}}">{{label}}</p>
        </div>
        {{/each}}
      </div>
    </div>
  </div>
  <div class="section-divider" aria-hidden="true"></div>
</section>
