<footer class="bg-primary border-t border-white/10 py-16 lg:py-20" role="contentinfo">
  <div class="animate-on-scroll-group max-w-7xl mx-auto px-6 lg:px-10">
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-10 mb-12">
      <div class="fade-in">
        <div class="flex items-center gap-2 mb-4">
          <span class="text-lg font-medium text-on-dark">{{brand.name}}</span>
        </div>
        <p class="text-sm text-on-dark-muted max-w-xs">{{brand.description}}</p>
      </div>

      <nav class="fade-in" aria-label="Product links">
        <h2 class="text-sm font-medium text-on-dark mb-4">Product</h2>
        <ul class="space-y-3">
          {{#each navigation.items}}
          <li><a href="{{href}}" class="text-sm text-on-dark-muted hover:text-on-dark transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </nav>

      <nav class="fade-in" aria-label="Company">
        <h2 class="text-sm font-medium text-on-dark mb-4">Company</h2>
        <ul class="space-y-3">
          <li><a href="#" class="text-sm text-on-dark-muted hover:text-on-dark transition-colors">About</a></li>
          <li><a href="#" class="text-sm text-on-dark-muted hover:text-on-dark transition-colors">Blog</a></li>
          <li><a href="#" class="text-sm text-on-dark-muted hover:text-on-dark transition-colors">Careers</a></li>
        </ul>
      </nav>

      <nav class="fade-in" aria-label="Legal links">
        <h2 class="text-sm font-medium text-on-dark mb-4">Legal</h2>
        <ul class="space-y-3">
          {{#each footer.links}}
          <li><a href="{{href}}" class="text-sm text-on-dark-muted hover:text-on-dark transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </nav>
    </div>

    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pt-8 border-t border-white/10">
      <p class="text-xs text-on-dark-muted opacity-80">{{footer.copyright}}</p>
    </div>
  </div>
</footer>
