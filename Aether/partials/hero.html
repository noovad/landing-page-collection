<section
  data-header="transparent"
  data-hero="true"
  class="animate-on-scroll-group min-h-screen bg-primary text-white overflow-hidden relative"
>
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-secondary/10 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 rounded-full bg-accent/10 blur-3xl"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-6 lg:px-10 pt-36 pb-0 flex flex-col items-center text-center">
    <div class="max-w-4xl">
      <h1 class="slide-up duration-700 hero-title mb-6">Speak like you're worth it</h1>
      <p class="slide-up duration-1000 body-lg max-w-2xl mx-auto mb-10 text-white/80">
        A human+AI coaching platform helping lawyers become more impactful communicators — in client meetings,
        courtrooms, negotiations, and beyond.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <div class="slide-up duration-700">
          <button class="btn-accent btn-lg inline-flex items-center gap-2">
            <span>Book a demo</span>
            <i data-lucide="chevron-right" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="slide-up duration-700 delay--200">
          <button class="btn-outline btn-lg">See our pricing</button>
        </div>
      </div>
    </div>

    <div class="fade-in duration-500 delay--400 w-full mt-16 max-w-5xl relative">
      <img
        src="https://picsum.photos/id/1025/1200/600"
        alt="Professional speaker"
        fetchpriority="high"
        loading="eager"
        class="w-full h-[400px] sm:h-[500px] lg:h-[600px] object-cover object-top rounded-t-2xl"
      />
      <div
        class="absolute top-16 left-6 sm:top-20 sm:left-10 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-green-500">
          <i data-lucide="dot"></i>
        </span>
        <span class="overlay-label text-text">Persuasion</span>
        <span class="ml-3 overlay-value text-text">+26%</span>
      </div>

      <div
        class="absolute top-44 right-6 sm:top-52 sm:right-10 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-green-500">
          <i data-lucide="dot"></i>
        </span>
        <span class="overlay-label text-text">Credibility</span>
        <span class="ml-3 overlay-value text-text">+31%</span>
      </div>

      <div
        class="absolute bottom-24 left-12 sm:bottom-20 sm:left-20 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-green-500">
          <i data-lucide="dot"></i>
        </span>
        <span class="overlay-label text-text">Likeability</span>
        <span class="ml-3 overlay-value text-text">+35%</span>
      </div>
    </div>
