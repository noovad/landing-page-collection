<section
  data-header="primary"
  data-hero="true"
  class="animate-on-scroll-group lg:min-h-screen relative flex flex-col overflow-hidden bg-primary text-on-dark"
>
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-overlay blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 rounded-full bg-overlay blur-3xl"></div>
  </div>

  <div class="relative z-10 mx-auto flex h-full w-full max-w-7xl flex-1 flex-col justify-between px-6 pt-36 lg:px-10">
    <div class="max-w-4xl self-center text-center">
      <h1 class="slide-up duration-700 mb-6">{{hero.title}}</h1>
      <p class="slide-up duration-1000 text-lg leading-relaxed max-w-2xl mx-auto mb-10 text-on-dark-secondary">
        {{hero.description}}
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <div class="slide-up duration-700">
          <button class="btn-accent btn-lg inline-flex items-center gap-2">
            <span>{{hero.primaryButton.label}}</span>
            <i data-lucide="chevron-right" class="h-4 w-4"></i>
          </button>
        </div>
        <div class="slide-up duration-700 delay--200">
          <button class="btn-outline btn-lg">{{hero.secondaryButton.label}}</button>
        </div>
      </div>
    </div>

    <div class="fade-in delay--400 mt-12 relative w-full max-w-5xl self-center text-text">
      <img
        src="https://picsum.photos/id/1025/1200/600"
        alt="Sales professional presenting to a client"
        fetchpriority="high"
        loading="eager"
        class="w-full h-[400px] sm:h-[500px] lg:h-[600px] object-cover object-top rounded-t-2xl"
      />
      <div
        class="absolute top-16 left-6 sm:top-20 sm:left-10 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-success-bright"> </span>
        <span class="text-xs font-medium">{{hero.metrics.[0].label}}</span>
        <span class="ml-3 text-base font-medium">{{hero.metrics.[0].value}}</span>
      </div>

      <div
        class="absolute top-44 right-6 sm:top-52 sm:right-10 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-success-bright"> </span>
        <span class="text-xs font-medium">{{hero.metrics.[1].label}}</span>
        <span class="ml-3 text-base font-medium">{{hero.metrics.[1].value}}</span>
      </div>

      <div
        class="absolute bottom-24 left-12 sm:bottom-20 sm:left-20 flex items-center gap-2 rounded-md bg-white px-4 py-1 shadow-lg"
      >
        <span class="h-2.5 w-2.5 rounded-full bg-success-bright"> </span>
        <span class="text-xs font-medium">{{hero.metrics.[2].label}}</span>
        <span class="ml-3 text-base font-medium">{{hero.metrics.[2].value}}</span>
      </div>
    </div>
  </div>
</section>
