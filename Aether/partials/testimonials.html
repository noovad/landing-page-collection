<section
  id="testimonials"
  data-header="solid"
  class="animate-on-scroll-group py-24 lg:py-32 overflow-hidden"
  aria-labelledby="testimonials-heading"
>
  <div class="fade-in max-w-7xl mx-auto px-6 lg:px-10 mb-16">
    <div class="flex items-center justify-between">
      <div>
        <span class="eyebrow">{{testimonials.eyebrow}}</span>
        <h2 id="testimonials-heading" class="mt-4 mb-4">{{testimonials.title}}</h2>
      </div>
      <div class="flex gap-2" role="group" aria-label="Testimonial navigation">
        <button
          id="testimonialPrev"
          class="w-12 h-12 rounded-full border border-border flex items-center justify-center hover:bg-surface transition-colors"
          aria-label="Previous testimonial"
        >
          <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <button
          id="testimonialNext"
          class="w-12 h-12 rounded-full border border-border flex items-center justify-center hover:bg-surface transition-colors"
          aria-label="Next testimonial"
        >
          <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="relative max-w-7xl mx-auto px-6 lg:px-10">
    <div
      id="testimonialTrack"
      class="flex gap-2 items-stretch mx-auto"
      role="region"
      aria-roledescription="carousel"
      aria-label="Customer testimonials"
    >
      {{#each testimonials.items}}
      <div class="card-testimonial" role="group" aria-roledescription="slide" aria-label="Testimonial {{add @index 1}} of {{../testimonials.items.length}}">
        <div class="flex items-center gap-4 mb-6">
          <span class="text-xl font-bold">{{company}}</span>
        </div>
        <blockquote class="text-base leading-relaxed flex-1 mb-6">
          "{{quote}}"
        </blockquote>
        <div class="flex items-center gap-4 pt-6 border-t border-border">
          <img
            src="{{avatar}}"
            alt="{{author}}"
            class="w-12 h-12 rounded-full object-cover"
            loading="lazy"
            width="48"
            height="48"
          />
          <div>
            <p class="font-semibold">{{author}}</p>
            <p class="text-muted">{{position}}</p>
          </div>
        </div>
      </div>
      {{/each}}
    </div>
  </div>
</section>
