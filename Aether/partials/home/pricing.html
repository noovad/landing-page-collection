<section
  id="pricing"
  data-header="solid"
  class="animate-on-scroll-group py-24 lg:py-32 relative"
  aria-labelledby="pricing-heading"
>
  <div class="max-w-7xl mx-auto px-6 lg:px-10 text-center">
    <span class="slide-up eyebrow">{{pricing.eyebrow}}</span>
    <h2 id="pricing-heading" class="slide-up mt-4 mb-4">{{pricing.title}}</h2>
    <p class="slide-up text-lg leading-relaxed text-muted max-w-2xl mx-auto mb-12">
      {{pricing.description}}
    </p>

    <div class="grid lg:grid-cols-3 gap-8 max-w-6xl mx-auto items-start" role="list" aria-label="Pricing plans">
      {{#each pricing.plans}}
      <div class="slide-up">
        <div class="{{#if featured}}card-pricing-featured{{else}}card-pricing{{/if}}" role="listitem">
          {{#if badge}}
          <span class="pricing-popular">{{badge}}</span>
          {{/if}}
          <div class="mb-6">
            <span class="inline-block px-3 py-1 bg-surface text-xs font-medium tracking-wide uppercase rounded-md"
              >{{name}}</span
            >
          </div>
          <p class="text-muted mb-4">{{tagline}}</p>
          <div class="mb-6">
            <span class="text-4xl font-medium" aria-label="{{price}}">{{price}}</span>
            {{#if period}}<span class="text-muted">{{period}}</span>{{/if}}
          </div>
          <p class="text-muted mb-6">{{billing}}</p>
          <ul class="space-y-3 mb-8" aria-label="{{name}} plan features">
            {{#each features}}
            <li class="flex items-center gap-3 text-sm">
              <i data-lucide="check" class="w-4 h-4 text-secondary flex-shrink-0"></i>
              {{this}}
            </li>
            {{/each}}
          </ul>
          <button class="{{#if featured}}btn-pricing btn-pricing-primary{{else}}btn-pricing btn-pricing-accent{{/if}}">{{button.label}}</button>
        </div>
      </div>
      {{/each}}
    </div>
  </div>
  <div class="section-divider" aria-hidden="true"></div>
</section>
