<section
  id="cta"
  data-header="primary"
  class="animate-on-scroll-group relative bg-primary text-on-dark py-24 lg:py-32 overflow-hidden"
  aria-labelledby="cta-heading"
>
  <div class="max-w-7xl mx-auto px-6 md:px-10">
    <div class="grid md:grid-cols-2 gap-16 items-center">
      <div>
        <h2 id="cta-heading" class="slide-up mb-6">{{cta.title}}</h2>
        <p class="slide-up text-lg leading-relaxed text-on-dark-secondary mb-8">
          {{cta.description}}
        </p>
        <div class="zoom-in delay-500">
          <button class="btn-accent btn-lg inline-flex items-center gap-2">
            <span>{{cta.button.label}}</span>
            <i data-lucide="chevron-right" class="h-4 w-4"></i>
          </button>
        </div>
      </div>
      <div class="slide-right delay--400">
        <img
          src="https://picsum.photos/id/1005/800/600"
          alt="Sales team collaborating"
          class="w-full h-[400px] object-cover"
          loading="lazy"
          width="800"
          height="600"
        />
      </div>
    </div>
  </div>
</section>
