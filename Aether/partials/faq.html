<section id="faq" data-header="solid" class="animate-on-scroll-group py-24 lg:py-32" aria-labelledby="faq-heading">
  <div class="max-w-5xl mx-auto px-6 lg:px-10">
    <div class="text-center mb-16">
      <h2 id="faq-heading" class="fade-in mt-4 mb-4">{{faq.title}}</h2>
    </div>

    <div role="list">
      {{#each faq.items}}
      <div x-data="{ open: false }" class="overflow-hidden" role="listitem">
        <button
          @click="open = !open"
          class="w-full flex justify-between items-center px-6 py-5 text-left text-base font-medium"
          :aria-expanded="open"
          aria-controls="faq-{{@index}}"
        >
          <span class="text-lg leading-relaxed">{{question}}</span>
          <i
            data-lucide="chevron-down"
            class="w-5 h-5 text-muted transition-transform duration-300 flex-shrink-0 ml-4"
            :class="{ 'rotate-180': open }"
          ></i>
        </button>
        <div id="faq-{{@index}}" class="faq-collapse" :class="{ 'open': open }" role="region">
          <div>
            <div class="px-6 pb-5 text-muted">
              {{answer}}
            </div>
          </div>
        </div>
      </div>
      {{/each}}
    </div>
  </div>
</section>
