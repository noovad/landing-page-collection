<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Demo | {{brand.name}}</title>
    <meta name="description" content="Schedule a 30-minute demo with Aether. See how we can help your sales team improve communication and close more deals." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="{{brand.website}}/booking/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Book a Demo | {{brand.name}}" />
    <meta property="og:description" content="Schedule a 30-minute demo with Aether. See how we can help your sales team improve communication and close more deals." />
    <meta property="og:url" content="{{brand.website}}/booking/" />
    <meta property="og:site_name" content="{{brand.name}}" />
    <meta property="og:image" content="https://picsum.photos/id/1025/1200/630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Book a Demo | {{brand.name}}" />
    <meta name="twitter:description" content="Schedule a 30-minute demo with Aether. See how we can help your sales team improve communication and close more deals." />
    <meta name="twitter:image" content="https://picsum.photos/id/1025/1200/630" />

    <link rel="stylesheet" href="../css/app.css" />
  </head>

  <body class="bg-background text-text">
    <a
      href="#main-content"
      class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:bg-primary focus:text-white focus:rounded-lg focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2"
    >
      Skip to main content
    </a>

    {{> header}}

    <main id="main-content" x-data="bookingPage" class="min-h-screen flex flex-col lg:flex-row">
      {{> booking/hero}}

      <div class="flex-1 flex items-center justify-center p-8 lg:p-16 relative">
        <div class="absolute inset-0">
          <img
            src="https://picsum.photos/id/1044/1200/800"
            alt=""
            class="w-full h-full object-cover"
            aria-hidden="true"
          />
        </div>

        <div class="relative z-10 w-full max-w-lg">
          <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            {{> booking/calendar}}
            {{> booking/time}}
            {{> booking/form}}
            {{> booking/confirmation}}
          </div>
        </div>
      </div>
    </main>

    {{> footer}}

    <script type="module" src="../js/app-booking.js"></script>
  </body>
</html>
