<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
    <style>
      .carousel {
        overflow: hidden;
        max-width: 948px;
        margin: 0 auto;
      }

      .track {
        display: flex;
        gap: 24px;
        will-change: transform;
      }

      .track-stepping {
        transition: transform 500ms ease;
      }

      .card {
        min-width: 300px;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white;
        flex-shrink: 0;
        border-radius: 4px;
        font-size: 1.5rem;
        font-weight: 600;
        color: #042e22;
      }

      .section-label {
        max-width: 948px;
        margin: 0 auto 1rem;
        padding: 0 1rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
    </style>
  </head>

  <body>
    <!-- 1. Stepping Carousel (existing) -->
    <section data-header="light" class="bg-surface py-20">
      <p class="section-label">Stepping Carousel — auto-slide, discrete jump</p>
      <div class="carousel">
        <div class="track track-stepping" id="trackStepping"></div>
      </div>
    </section>

    <!-- 2. Continuous Marquee -->
    <section data-header="light" class="py-20">
      <p class="section-label">Continuous Marquee — smooth, always moving</p>
      <div class="carousel">
        <div class="track" id="trackMarquee"></div>
      </div>
    </section>

    <!-- 3. Manual Navigation -->
    <section data-header="light" class="bg-surface py-20">
      <p class="section-label">Manual Navigation — no auto-loop, left/right arrows</p>
      <div class="carousel" style="position: relative">
        <button
          id="navPrev"
          style="
            position: absolute;
            left: -16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #042e22;
          "
        >
          &#8592;
        </button>
        <div class="track track-stepping" id="trackManual"></div>
        <button
          id="navNext"
          style="
            position: absolute;
            right: -16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: #042e22;
          "
        >
          &#8594;
        </button>
      </div>
    </section>

    <script>
      const data = ["Allen & Overy", "Baker McKenzie", "Clifford Chance", "Davis Polk", "Freshfields"];
      const gap = 24;

      // ─── 1. Stepping Carousel ───
      (function () {
        const track = document.getElementById("trackStepping");
        const extended = [...data, ...data.slice(0, 3)];
        extended.forEach((label) => {
          const card = document.createElement("div");
          card.className = "card";
          card.textContent = label;
          track.appendChild(card);
        });

        let idx = 0;
        function cardW() {
          return track.firstElementChild.offsetWidth + gap;
        }

        function slide() {
          idx++;
          track.style.transition = "transform 500ms ease";
          track.style.transform = `translateX(-${idx * cardW()}px)`;
        }

        track.addEventListener("transitionend", () => {
          if (idx >= data.length) {
            idx = 0;
            track.style.transition = "none";
            track.style.transform = "translateX(0)";
            track.offsetHeight;
          }
        });

        setInterval(slide, 5000);
      })();

      // ─── 2. Continuous Marquee ───
      (function () {
        const track = document.getElementById("trackMarquee");
        data.forEach((label) => {
          const card = document.createElement("div");
          card.className = "card";
          card.textContent = label;
          track.appendChild(card);
        });
        const originals = Array.from(track.children);
        originals.forEach((item) => track.appendChild(item.cloneNode(true)));

        const style = getComputedStyle(track);
        const g = parseInt(style.gap, 10) || 0;
        let setW = 0;
        originals.forEach((c, i) => {
          setW += c.offsetWidth;
          if (i < originals.length - 1) setW += g;
        });

        let offset = 0;
        const speed = 0.5;

        function tick() {
          offset = (offset + speed) % setW;
          track.style.transform = `translateX(${-offset}px)`;
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();

      // ─── 3. Manual Navigation ───
      (function () {
        const track = document.getElementById("trackManual");
        const prevBtn = document.getElementById("navPrev");
        const nextBtn = document.getElementById("navNext");

        data.forEach((label) => {
          const card = document.createElement("div");
          card.className = "card";
          card.textContent = label;
          track.appendChild(card);
        });

        let pos = 0;

        function cardW() {
          return track.firstElementChild.offsetWidth + gap;
        }

        function maxScroll() {
          return Math.max(0, track.scrollWidth - track.parentElement.offsetWidth);
        }

        function update() {
          track.style.transition = "transform 400ms ease";
          track.style.transform = `translateX(${-pos}px)`;
        }

        nextBtn.addEventListener("click", () => {
          pos = Math.min(pos + cardW(), maxScroll());
          update();
        });

        prevBtn.addEventListener("click", () => {
          pos = Math.max(pos - cardW(), 0);
          update();
        });
      })();
    </script>
  </body>
</html>
